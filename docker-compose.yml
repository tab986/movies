# GameWise API — self-host on Contabo VPS (or any Docker host).
# Copy .env.example to .env and fill in secrets before starting.
#
# External Postgres (Supabase, etc.): set DATABASE_URL in .env, then:
#   docker compose up -d api
#
# Local Postgres for dev/testing:
#   docker compose --profile local-db up -d

services:
  api:
    build: .
    container_name: gamewise-api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.PORT||5000;require('http').get('http://127.0.0.1:'+p+'/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  postgres:
    profiles: ["local-db"]
    image: postgres:16-alpine
    container_name: gamewise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
