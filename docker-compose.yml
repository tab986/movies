# Optional local Postgres (DATABASE_SSL=false). Default plan uses Supabase cloud instead.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: movies
      POSTGRES_PASSWORD: movies
      POSTGRES_DB: movies_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movies -d movies_app"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
